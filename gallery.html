<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
        <link rel="icon" type="image/x-icon" href="images/favicon.ico">
        <link rel="stylesheet" href="background-styles.css">
        <link rel="stylesheet" href="stylesheets/gallery-styles.css">
        <link rel="stylesheet" href="stylesheets/search-styles.css">
        <link rel="stylesheet" href="stylesheets/modes-styles.css">

        <!-- Preload hover assets -->
        <link rel="preload" as="image" href="images/ui/download-button_highlight.png">
        <link rel="preload" as="image" href="images/ui/download-button_highlight2.png">
        <link rel="preload" as="image" href="images/ui/select-button_hover.png">
        <link rel="preload" as="image" href="images/ui/select-button_selected.png">
        <link rel="preload" as="image" href="images/ui/large-arrow_highlight.png">
        <link rel="preload" as="image" href="images/ui/x.png">
        <link rel="preload" as="image" href="images/ui/panel_highlight.png">

        <script type="module" src="scripts/gallery-page.js"></script>
        <script type="module" src="scripts/decor.js"></script>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gallery | FumoFumos Archives</title>
        <meta name="description" content="Browse and download free fumo pixel art from FumoFumos Archives. Personal and commercial use allowed.">
    </head>
    <body>
        <header>
            <nav class="menu">
                <input type="checkbox" id="menu">
                <div class="logo">
                    <div class="fumos">
                        <div class="fumo"><img src="images/logo/reimu.png" alt="Small Reimu fumo"></div>
                        <div class="fumo"><img src="images/logo/sanae.png" alt="Small Sanae fumo"></div>
                        <div class="fumo"><img src="images/logo/tewi.png" alt="Small Tewi fumo"></div>
                    </div>
                    <label for="menu" class="menu-toggle"></label>
                </div>

                <div class="items">
                    <a href="index.html" class="item">Home</a>
                    <a href="gallery.html" class="item active">Gallery</a>
                    <a href="about.html" class="item">About</a>
                </div>
            </nav>
        </header>

        <div class="main">
            <div class="top-container">
                <div class="search-wrapper">
                    <img src="images/ui/search.png" alt="" class="search-icon">
                    <input type="search" placeholder="Search..." class="search-input" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off">
                    <button class="clear-btn" type="button">x</button>

                    <div class="search-results">
                        <button class="search-result" type="button">Reimu Hakurei</button>
                        <button class="search-result" type="button">Marisa Kirisame</button>
                        <button class="search-result" type="button">Sakuya Izayoi</button>
                    </div>
                </div>
                <button class="mode-btn single active"><img src="images/ui/icon-single.png"></button>
                <button class="mode-btn multiple"><img src="images/ui/icon-many.png"></button>
            </div>
            <div class="line">
                <p class="title">
                    <span class="fill left"></span>
                    <span class="label"><img src="images/ui/heart.png" class="heart" alt="Heart icon">Gallery<img src="images/ui/heart.png" class="heart" alt="Heart icon"></span>
                    <span class="fill right"></span>
                </p>
            </div>
            <div class="mode-views">
                <!-- SINGLE MODE -->
                <div class="view single-view active-view">
                    <div class="gallery-container panel">
                        <a class="download-btn" href="" download><img src="images/ui/download.png" alt="Download icon"></a>
                        <button class="nav-left" type="button" aria-label="Previous image"></button>

                        <div class="gallery-wrapper">
                            <div class="gallery" id="gallery">
                                <div class="gallery-track"></div>
                            </div>

                            <div class="gallery-text">
                                <p class="title" id="name">Name</p>
                                <p class="subtitle" id="date">Date</p>
                            </div>
                            <a class="download-btn-mobile" href="" download>
                                <img src="images/ui/download.png" alt="Download icon">
                            </a>
                        </div>

                        <button class="nav-right" type="button" aria-label="Next image"></button>
                    </div>
                </div>

                <!-- MULTIPLE MODE -->
                <div class="view multiple-view">
                    <div class="all-artworks latest" id="all-artworks"></div>
                </div>
            </div>

            <a class="download-all-btn" href="downloads/all.zip" download>
                Download All
                <img src="images/ui/download.png" alt="Download icon">
            </a>
            <p class="dash-line">
                <span class="dash-fill"></span>
            </p>
        </div>

        <footer class="footer">
            <img src="images/ui/heart.png">
            <p>Made with Fumos</p>
            <img src="images/ui/heart.png">
        </footer>
    </body>
</html>
