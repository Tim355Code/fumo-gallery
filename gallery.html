<!DOCTYPE html>

<html lang="en">
    <head>
        <link rel="icon" type="image/x-icon" href="images/favicon.ico">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Gallery | FumoFumos Archives</title>
        <meta name="description" content="Browse and download free fumo pixel art from FumoFumos Archives. Personal and commercial use allowed.">

        <link rel="stylesheet" href="styles/base.css">
        <link rel="stylesheet" href="styles/layout.css">
        <link rel="stylesheet" href="styles/components.css">
        <link rel="stylesheet" href="styles/gallery.css">

        <script type="module" src="scripts/gallery-page.js"></script>
        <script type="module" src="scripts/decor.js"></script>

        <!-- Preload hover assets -->
        <link rel="preload" as="image" href="images/ui/download-button_highlight.png">
        <link rel="preload" as="image" href="images/ui/download-button_highlight2.png">
        <link rel="preload" as="image" href="images/ui/select-button_hover.png">
        <link rel="preload" as="image" href="images/ui/select-button_selected.png">
        <link rel="preload" as="image" href="images/ui/large-arrow_highlight.png">
        <link rel="preload" as="image" href="images/ui/x.png">
        <link rel="preload" as="image" href="images/ui/panel_highlight.png">
        <link rel="preload" as="image" href="images/ui/icon-single_highlight.png">
        <link rel="preload" as="image" href="images/ui/icon-many_highlight.png">
    </head>
    <body>
        <header class="site-header">
            <nav class="menu">
                <input class="menu-checkbox" type="checkbox" id="menu">

                <div class="logo">
                    <div class="logo-fumos">
                        <div class="logo-fumo"><img src="images/logo/reimu.png" alt="Small Reimu fumo"></div>
                        <div class="logo-fumo"><img src="images/logo/sanae.png" alt="Small Sanae fumo"></div>
                        <div class="logo-fumo"><img src="images/logo/tewi.png" alt="Small Tewi fumo"></div>
                    </div>

                    <label for="menu" class="menu-toggle" aria-label="Toggle menu"></label>
                </div>

                <div class="menu-items">
                    <a href="index.html" class="menu-item">Home</a>
                    <a href="gallery.html" class="menu-item is-active">Gallery</a>
                    <a href="about.html" class="menu-item">About</a>
                </div>
            </nav>
        </header>

        <main class="page">
            <div class="gallery-toolbar">
                <div class="search">
                    <img src="images/ui/search.png" alt="" class="search-icon">

                    <input
                        type="search"
                        placeholder="Search..."
                        class="search-input"
                        spellcheck="false"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                    >

                    <button class="search-clear" type="button">x</button>
                    <div class="search-results"></div>
                </div>

                <button class="mode-button single is-active" type="button">
                    <img src="images/ui/icon-single.png" alt="Single view">
                </button>

                <button class="mode-button multiple" type="button">
                    <img src="images/ui/icon-many.png" alt="Grid view">
                </button>
            </div>

            <div class="title-row">
                <p class="decor-title">
                    <span class="decor-title-fill left"></span>
                    <span class="decor-title-label">
                        <img src="images/ui/heart.png" class="icon-heart" alt="">
                        Gallery
                        <img src="images/ui/heart.png" class="icon-heart" alt="">
                    </span>
                    <span class="decor-title-fill"></span>
                </p>
            </div>

            <div class="gallery-views">
                <section class="gallery-view single-view is-active">
                    <div class="panel gallery-panel">
                        <a class="download-button gallery-download" href="" download>
                            <img src="images/ui/download.png" alt="Download">
                        </a>

                        <button class="gallery-arrow previous" type="button" aria-label="Previous image"></button>

                        <div class="gallery-wrapper">
                            <div class="gallery-stage" id="gallery">
                                <div class="gallery-track"></div>
                            </div>

                            <div class="gallery-caption">
                                <p class="pixel-title gallery-name" id="name">Name</p>
                                <p class="gallery-date" id="date">Date</p>
                            </div>

                            <a class="download-button gallery-download-mobile" href="" download>
                                <img src="images/ui/download.png" alt="Download">
                            </a>
                        </div>

                        <button class="gallery-arrow next" type="button" aria-label="Next image"></button>
                    </div>
                </section>

                <section class="gallery-view multiple-view">
                    <div class="gallery-grid" id="all-artworks"></div>
                </section>
            </div>

            <a class="download-button download-all" href="downloads/all.zip" download>
                <img src="images/ui/download.png" alt="">
                Download Full Pack
            </a>
            <div class="dash-line">
                <span class="dash-fill"></span>
            </div>
        </main>

        <footer class="footer">
            <img src="images/ui/heart.png">
            <p>Made with Fumos</p>
            <img src="images/ui/heart.png">
        </footer>
    </body>
</html>
