<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
        <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
        <link rel="stylesheet" href="background-styles.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FumoFumo Archives</title>
    </head>
    <body>
        <header>
            <nav class="menu">
                <input type="checkbox" id="menu">
                <div class="logo">
                    <div class="fumos">
                        <div class="fumo"><img src="images/logo/reimu.png"></div>
                        <div class="fumo"><img src="images/logo/sanae.png"></div>
                        <div class="fumo"><img src="images/logo/tewi.png"></div>
                    </div>
                    <label for="menu" class="menu-toggle"></label>
                </div>

                <div class="items">
                    <a href="#" class="item active">Home</a>
                    <a href="#" class="item">Gallery</a>
                    <a href="#" class="item">About</a>
                </div>
            </nav>
        </header>
        
        <div class="main">
            <div class="panel intro">
                <div class="intro-media">
                    <img src="images/fumos/reimu.png" alt="Large Reimu fumo">
                </div>

                <div class="intro-text">
                    <h1 class="title">Fumo Fumos!!!</h1>
                    <p>
                        Welcome to Tim_M's Fumo Pixel Art collection! <br> Free* to use for anything!
                    </p>
                </div>

                <div class="intro-side">
                    <a href="#" class="big-button">Free Download!</a>
                    <p class="side-note">New fumos are added... occasionally.</p>
                </div>
            </div>
        </div>
    </body>
</html>
