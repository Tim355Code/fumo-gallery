<!DOCTYPE html>

<html lang="en">
    <head>
        <link rel="icon" type="image/x-icon" href="images/favicon.ico">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>FumoFumos Archives | Free Fumo Pixel Art by Tim_M</title>
        <meta name="description" content="Free-to-use fumo pixel art by Tim_M. Check out the latest additions, download all sprites, and learn about the site.">

        <script type="module" src="scripts/home.js"></script>
        <script type="module" src="scripts/decor.js"></script>

        <link rel="stylesheet" href="styles/base.css">
        <link rel="stylesheet" href="styles/layout.css">
        <link rel="stylesheet" href="styles/components.css">
        <link rel="stylesheet" href="styles/home.css">

        <!-- Preload hover assets -->
        <link rel="preload" as="image" href="images/ui/button_highlight.png">
        <link rel="preload" as="image" href="images/ui/arrow_highlight.png">
        <link rel="preload" as="image" href="images/ui/x.png">

        <script type="application/ld+json">
            {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "FumoFumos Archives",
            "alternateName": "FumoFumos.com",
            "url": "https://fumofumos.com/"
            }
        </script>
    </head>
    <body>
        <header class="site-header">
            <nav class="menu">
                <input class="menu-checkbox" type="checkbox" id="menu">

                <div class="logo">
                    <div class="logo-fumos">
                        <div class="logo-fumo"><img src="images/logo/reimu.png" alt="Small Reimu fumo"></div>
                        <div class="logo-fumo"><img src="images/logo/sanae.png" alt="Small Sanae fumo"></div>
                        <div class="logo-fumo"><img src="images/logo/tewi.png" alt="Small Tewi fumo"></div>
                    </div>

                    <label for="menu" class="menu-toggle" aria-label="Toggle menu"></label>
                </div>

                <div class="menu-items">
                    <a href="index.html" class="menu-item is-active">Home</a>
                    <a href="gallery.html" class="menu-item">Gallery</a>
                    <a href="about.html" class="menu-item">About</a>
                </div>
            </nav>
        </header>
        <main class="page">
            <section class="panel home-intro">
                <div class="home-intro-media">
                    <div class="home-fumo-wrapper">
                        <img src="images/fumos/reimu.png" alt="Reimu fumo">
                    </div>
                </div>

                <div class="home-intro-text">
                    <h1 class="pixel-title">Fumo Fumos!!!</h1>
                    <p>Welcome to FumoFumos.com! <br>We host a collection of free* to use fumo pixel art!</p>
                </div>

                <div class="home-intro-side">
                    <div class="home-cta">
                        <a class="pixel-button" href="downloads/all.zip" download>
                            <span class="home-download-content">
                                <img src="images/ui/download.png" alt="" class="home-download-icon">
                                <span class="home-download-label">Download Full Pack</span>
                            </span>
                        </a>

                        <p class="home-note">Individual downloads are in gallery.</p>
                    </div>
                </div>
            </section>

            <div class="latest-heading">
                <p class="latest-heading-text">
                    <img src="images/ui/star.png" alt="">
                    Latest Additions
                    <img src="images/ui/star.png" alt="" class="latest-heading-star-mobile">
                </p>

                <div class="latest-heading-fill" aria-hidden="true"></div>

                <a href="gallery.html" class="text-link latest-heading-link">
                    View All<span class="text-link-icon"></span>
                </a>
            </div>

            <section class="latest-grid" id="latest-artworks"></section>
        </main>
        <footer class="footer">
            <img src="images/ui/heart.png">
            <p>Made with Fumos</p>
            <img src="images/ui/heart.png">
        </footer>
    </body>
</html>
