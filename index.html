<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
        <link rel="icon" type="image/x-icon" href="images/favicon.ico">
        <link rel="stylesheet" href="background-styles.css">
        <link rel="stylesheet" href="stylesheets/intro-styles.css">
        <link rel="stylesheet" href="stylesheets/latest-styles.css">
        <script type="text/javascript" src="scripts/data.js"></script>
        <script type="text/javascript" src="scripts/homepage.js" defer></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FumoFumo Archives</title>
    </head>
    <body>
        <header>
            <nav class="menu">
                <input type="checkbox" id="menu">
                <div class="logo">
                    <div class="fumos">
                        <div class="fumo"><img src="images/logo/reimu.png" alt="Small Reimu fumo"></div>
                        <div class="fumo"><img src="images/logo/sanae.png" alt="Small Sanae fumo"></div>
                        <div class="fumo"><img src="images/logo/tewi.png" alt="Small Tewi fumo"></div>
                    </div>
                    <label for="menu" class="menu-toggle"></label>
                </div>

                <div class="items">
                    <a href="index.html" class="item active">Home</a>
                    <a href="gallery.html" class="item">Gallery</a>
                    <a href="about.html" class="item">About</a>
                </div>
            </nav>
        </header>
        <div class="main">
            <div class="panel intro">
                <div class="intro-media">
                    <div class="top-fumo-wrapper">
                        <img src="images/fumos/reimu.png" alt="Reimu fumo" class="top-fumo">
                    </div>
                </div>

                <div class="intro-text">
                    <h1 class="title">Fumo Fumos!!!</h1>
                    <p>
                        Welcome to FumoFumos.com! <br>We host a collection of free* to use fumo pixel art!
                    </p>
                </div>

                <div class="intro-side">
                    <div class="cta-wrap">
                        <a class="big-button" href="downloads/all.zip" download>
                            <span class="button-content">
                                <img src="images/ui/download.png" alt="Download button" class="button-icon">
                                <span class="button-label">Download Full Pack</span>
                            </span>
                        </a>
                        <p class="side-note">Individual downloads are in gallery.</p>
                    </div>
                </div>
            </div>
            <div class="subtitle">
                <p class="subtitle-content"><img src="images/ui/star.png" class="star">Latest Additions<img src="images/ui/star.png" class="star" id="rightstar"></p> 
                <div class="subtitle-fill" aria-hidden="true"></div>
                <a href="gallery.html" class="subtitle-link">View All<span class="subtitle-icon"></span></a>
            </div>
            <div class="latest" id="latest-artworks">
               <!-- <div class="panel frame">
                    <img src="images/fumos/reimu.png" alt="temp">
                    <p class="name">Cool thing</p>
                    <p class="date">Friday 17 April</p>
                </div> -->
            </div>
        </div>
        <footer class="footer">
            <img src="images/ui/heart.png">
            <p>Made with Fumos</p>
            <img src="images/ui/heart.png">
        </footer>
    </body>
</html>
